<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohanish's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-color: #1a73e8;
            --hr-color: #bdc1c6;
            --sparkle-color: #fffdef; /* Sparkle color from image */
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #8ab4f8;
            --hr-color: #444;
            --sparkle-color: #fffdef;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto; 
            color: var(--text-color);
            transition: all 0.3s ease;
            padding: 60px 20px 40px;
        }

        /* Theme Toggle */
        .theme-switch {
            position: fixed; top: 20px; right: 20px;
            padding: 10px 15px; background: var(--accent-color);
            color: white; border: none; border-radius: 20px;
            cursor: pointer; font-weight: bold; z-index: 1000;
            transition: all 0.3s ease;
        }
        .theme-switch:hover {
            transform: translateY(-5px) scale(1.15);
            transition: all 0.5s ease;
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; color: var(--accent-color); font-size: 2.5rem; }
        h1.hover{transform: scale(1.03);}

        /* Project Cards */
        .projects-container {
            display: flex; gap: 30px; justify-content: center; flex-wrap: wrap;
            width: 100%; max-width: 1200px;
        }

        .project-card {
            background: var(--card-bg); border-radius: 12px;
            width: 500px; height: 600px; display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .project-card:hover { transform: scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.25); }
        
        iframe { width: 100%; height: 100%; border: none; background: white; }

        hr { width: 100%; border: 0; border-top: 1px solid var(--hr-color); margin: 40px 0; }
        
        /* --- SPARKLE BUTTON EFFECT --- */
        .sparkle-button {
            position: relative;
            display: inline-block;
            padding: 12px 24px;
            margin: 0 15px;
            background: var(--accent-color);
            color: white !important;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s ease;
            overflow: visible; /* Allows stars to sit outside button */
        }

        /* The "Stars" container */
        .stars {
            display: none; /* Hidden by default as per the code in image */
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Allows clicks to go through to button */
        }

        /* Sparkle/Star Shapes */
        .star {
            position: absolute;
            background: var(--sparkle-color);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            width: 12px; height: 12px;
            filter: drop-shadow(0 0 10px var(--sparkle-color)); /* From the CSS in image */
        }

        /* Hover Logic from the image */
        .sparkle-button:hover .stars {
            display: block;
            filter: drop-shadow(0 0 10px #fffdef);
            /* Shows stars on hover */
        }

        .sparkle-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 20px var(--accent-color);
        }

        /* Random star placements */
        .star-1 { top: -10px; left: 10%; animation: twinkle 1s infinite; }
        .star-2 { top: 20%; right: -10px; animation: twinkle 1.2s infinite; }
        .star-3 { bottom: -10px; left: 40%; animation: twinkle 0.8s infinite; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
    </style>
</head>
<body>

    <button class="theme-switch" onclick="toggleTheme()">Toggle Theme</button>

    <header>
        <h1>Mohanish's Portfolio</h1>
        <h2>I'm a Web Developer</h2>
    </header>

    <div class="projects-container">
        <div class="project-card">
            <a href="./public/movie-ranking.html"><h2>Movie Ranking Project</h2></a>
            <iframe src="./public/movie-ranking.html"></iframe>
        </div>
        <div class="project-card">
            <a href="./public/birthday-invite.html"><h2>Birthday Invite Project</h2></a>
            <iframe src="./public/birthday-invite.html"></iframe>
        </div>
    </div>
    
    <hr />

    <footer>
        <a href="./public/about.html" class="sparkle-button">
            About Me
            <div class="stars">
                <div class="star star-1"></div>
                <div class="star star-2"></div>
                <div class="star star-3"></div>
            </div>
        </a>
        <a href="./public/contact.html" class="sparkle-button">
            Contact Me
            <div class="stars">
                <div class="star star-1"></div>
                <div class="star star-2"></div>
                <div class="star star-3"></div>
            </div>
        </a>
    </footer>

    <script>
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            if (currentTheme === 'dark') { body.removeAttribute('data-theme'); } 
            else { body.setAttribute('data-theme', 'dark'); }
        }
    </script>
</body>
</html>
